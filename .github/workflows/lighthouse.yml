name: Lighthouse CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 2 AM UTC
    - cron: "0 2 * * *"

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: premium-telehealth-website/my-app/package-lock.json

      - name: Install dependencies
        working-directory: premium-telehealth-website/my-app
        run: npm ci

      - name: Build application
        working-directory: premium-telehealth-website/my-app
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_APP_NAME: Rimal Health
          NODE_ENV: production

      - name: Run Lighthouse CI
        working-directory: premium-telehealth-website/my-app
        run: |
          npm install -g @lhci/cli@0.14.x
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports
          path: |
            premium-telehealth-website/my-app/.lighthouseci/
            premium-telehealth-website/my-app/lighthouse-results/

      - name: Comment PR with Lighthouse results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Find the Lighthouse results
            const lhciDir = path.join(process.cwd(), 'premium-telehealth-website/my-app/.lighthouseci');
            const files = fs.readdirSync(lhciDir);
            const manifest = files.find(f => f.startsWith('manifest'));
            
            if (manifest) {
              const manifestData = JSON.parse(fs.readFileSync(path.join(lhciDir, manifest), 'utf8'));
              
              let comment = '## 🚦 Lighthouse Performance Report\n\n';
              comment += '| URL | Performance | Accessibility | Best Practices | SEO |\n';
              comment += '|-----|-------------|---------------|----------------|-----|\n';
              
              manifestData.forEach(result => {
                const url = result.url.replace('http://localhost:3000', '');
                const perf = Math.round(result.summary.performance * 100);
                const a11y = Math.round(result.summary.accessibility * 100);
                const bp = Math.round(result.summary['best-practices'] * 100);
                const seo = Math.round(result.summary.seo * 100);
                
                const getBadge = (score) => {
                  if (score >= 90) return '🟢';
                  if (score >= 70) return '🟡';
                  return '🔴';
                };
                
                comment += `| ${url || '/'} | ${getBadge(perf)} ${perf} | ${getBadge(a11y)} ${a11y} | ${getBadge(bp)} ${bp} | ${getBadge(seo)} ${seo} |\n`;
              });
              
              comment += '\n*Scores are out of 100. Green >= 90, Yellow >= 70, Red < 70*';
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
